<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DeepSeek 流式助手 - 侧边栏修复版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-color: #f5f7fb;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --user-bubble: #5dade2;
            --assistant-bubble: #e5e5ea;
            --reasoning-bubble: #fef9c3;
            --hover-bg: #f1f5f9;
            --modal-bg: rgba(0,0,0,0.5);
        }
        body.dark {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --user-bubble: #3b82f6;
            --assistant-bubble: #334155;
            --reasoning-bubble: #2d3748;
            --hover-bg: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }
        .app { display: flex; height: 100vh; position: relative; }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 20;
            transform: translateX(-100%);
        }
        .sidebar.open {
            transform: translateX(0);
        }
        .sidebar-header { padding: 20px 16px; border-bottom: 1px solid var(--border-color); }
        .new-chat-btn {
            width: 100%; padding: 10px; background-color: var(--user-bubble); color: white;
            border: none; border-radius: 12px; font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: background 0.2s;
        }
        .new-chat-btn:hover { background-color: #4a90d9; }
        .sessions-list { flex: 1; overflow-y: auto; padding: 12px; }
        .session-item {
            display: flex; justify-content: space-between; align-items: center; padding: 12px;
            margin-bottom: 8px; border-radius: 12px; cursor: pointer;
            background-color: var(--card-bg); border: 1px solid var(--border-color);
        }
        .session-item.active { background-color: var(--hover-bg); border-left: 3px solid var(--user-bubble); }
        .session-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px; }
        .session-actions { display: flex; gap: 4px; }
        .edit-session, .delete-session, .export-session {
            background: none; border: none; font-size: 16px; cursor: pointer;
            color: var(--text-secondary); padding: 4px 6px; border-radius: 8px;
        }
        .edit-session:hover, .export-session:hover { background-color: var(--hover-bg); }
        .delete-session:hover { background-color: #ef4444; color: white; }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .toolbar {
            padding: 12px 20px;
            background-color: var(--sidebar-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .menu-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            margin-right: 10px;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 8px;
        }
        .menu-toggle:hover { background-color: var(--hover-bg); }
        .current-session-name {
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
        }
        .current-session-name:hover { background-color: var(--hover-bg); }
        .toolbar-buttons { display: flex; gap: 12px; align-items: center; }
        .icon-btn {
            background: none; border: none; font-size: 14px; cursor: pointer;
            color: var(--text-primary); padding: 6px 12px; border-radius: 20px;
            transition: background 0.2s;
            font-weight: 500;
        }
        .icon-btn:hover { background-color: var(--hover-bg); }
        .api-key-btn {
            background-color: #ef4444; color: white; border: none;
            padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;
        }
        .api-key-btn:hover { background-color: #dc2626; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .message-wrapper { display: flex; flex-direction: column; }
        .message-row { display: flex; justify-content: flex-end; margin-bottom: 4px; }
        .assistant-row { justify-content: flex-start; }
        .user-row { justify-content: flex-end; }
        .bubble {
            max-width: 90%;
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.4;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .user-message .bubble { background-color: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
        .assistant-message .bubble { background-color: var(--assistant-bubble); color: var(--text-primary); border-bottom-left-radius: 4px; }
        .reasoning-container { margin-bottom: 8px; max-width: 90%; }
        .reasoning-header {
            background-color: var(--reasoning-bubble);
            border-radius: 12px;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            width: fit-content;
        }
        .reasoning-content {
            background-color: var(--reasoning-bubble);
            border-radius: 12px;
            padding: 12px;
            margin-top: 4px;
            font-size: 14px;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            white-space: pre-wrap;
            display: none;
        }
        .reasoning-content.show { display: block; }
        .message-actions { display: flex; gap: 8px; margin-top: 6px; justify-content: flex-end; }
        .assistant-actions { justify-content: flex-start; }
        .action-btn {
            background: none; border: none; font-size: 14px; cursor: pointer;
            color: var(--text-secondary); padding: 4px 8px; border-radius: 16px;
            display: inline-flex; align-items: center; gap: 4px;
            transition: background 0.2s;
        }
        .action-btn:hover { background-color: var(--hover-bg); }
        .version-control {
            display: inline-flex; align-items: center; gap: 4px;
            background-color: var(--hover-bg); border-radius: 20px; padding: 2px 6px;
            font-size: 12px;
        }
        .input-area {
            padding: 16px 20px; background-color: var(--sidebar-bg); border-top: 1px solid var(--border-color);
            display: flex; gap: 12px; align-items: flex-end;
        }
        #user-input {
            flex: 1; border: 1px solid var(--border-color); border-radius: 24px;
            padding: 12px 16px; font-size: 16px; background-color: var(--card-bg);
            color: var(--text-primary); resize: none; font-family: inherit;
        }
        #send-btn {
            background-color: var(--user-bubble); border: none; color: white;
            border-radius: 40px; padding: 12px 20px; font-size: 16px; cursor: pointer;
            transition: background 0.2s;
        }
        #send-btn:hover { background-color: #4a90d9; }
        .fab {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 56px;
            height: 56px;
            background-color: var(--user-bubble);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            z-index: 20;
        }
        .fab:hover {
            background-color: #4a90d9;
            transform: scale(1.05);
        }
        .api-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--modal-bg);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .api-modal-content {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .api-modal-content input {
            width: 100%;
            padding: 12px;
            margin: 16px 0;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-size: 14px;
        }
        .api-modal-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        .api-modal-buttons button {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
        }
        .api-confirm {
            background-color: var(--user-bubble);
            color: white;
        }
        .api-cancel {
            background-color: var(--border-color);
            color: var(--text-primary);
        }
        .confirm-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--modal-bg);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .confirm-modal-content {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            width: 280px;
            text-align: center;
        }
        .confirm-modal-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
        }
        .confirm-modal-buttons button {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
        }
        .confirm-yes { background-color: #ef4444; color: white; }
        .confirm-no { background-color: var(--border-color); color: var(--text-primary); }
        .streaming-cursor::after {
            content: "▋";
            animation: blink 1s step-end infinite;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background-color: rgba(0,0,0,0.8); color: white; padding: 8px 16px;
            border-radius: 40px; font-size: 14px; z-index: 2000;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
            z-index: 15;
        }
        .overlay.show { display: block; }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">➕ 新建对话</button>
        </div>
        <div class="sessions-list" id="sessionsList"></div>
    </div>
    <div class="main">
        <div class="toolbar">
            <div style="display: flex; align-items: center;">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <span class="current-session-name" id="currentSessionName" title="点击重命名">新对话</span>
            </div>
            <div class="toolbar-buttons">
                <button class="icon-btn" id="themeToggle" title="白天/黑夜">🌙</button>
                <button class="icon-btn" id="deepThinkToggle" title="深度思考">深度思考</button>
                <button class="api-key-btn" id="apiKeyBtn">🔑 设置 API Key</button>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="input-area">
            <textarea id="user-input" rows="1" placeholder="输入你的问题... (长按输入框可粘贴)"></textarea>
            <button id="send-btn">发送</button>
        </div>
    </div>
</div>
<button class="fab" id="fabNewChat" title="新建对话">+</button>
<div class="overlay" id="overlay"></div>

<div id="apiModal" class="api-modal">
    <div class="api-modal-content">
        <h3>设置 DeepSeek API Key</h3>
        <input type="text" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
        <div class="api-modal-buttons">
            <button class="api-confirm" id="apiConfirm">确认</button>
            <button class="api-cancel" id="apiCancel">取消</button>
        </div>
    </div>
</div>

<div id="confirmModal" class="confirm-modal">
    <div class="confirm-modal-content">
        <p>确定要删除这个对话吗？</p>
        <div class="confirm-modal-buttons">
            <button class="confirm-yes" id="confirmDelete">删除</button>
            <button class="confirm-no" id="cancelDelete">取消</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- 常量 ----------
        const DEEPSEEK_API_URL = "https://api.deepseek.com/v1/chat/completions";
        const DB_NAME = "DeepSeekChatDB";
        const DB_VERSION = 1;
        const STORE_NAME = "sessions";

        let DEEPSEEK_API_KEY = localStorage.getItem('deepseek_api_key') || '';

        // 全局数据
        let sessions = [];
        let currentSessionId = null;
        let pendingDeleteSessionId = null;
        let deepThinkEnabled = false;
        let currentTheme = "light";
        let autoScrollEnabled = true;
        let db = null;

        // DOM 元素
        const sessionsListEl = document.getElementById('sessionsList');
        const chatMessagesEl = document.getElementById('chatMessages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const newChatBtn = document.getElementById('newChatBtn');
        const themeToggle = document.getElementById('themeToggle');
        const deepThinkToggle = document.getElementById('deepThinkToggle');
        const currentSessionNameSpan = document.getElementById('currentSessionName');
        const confirmModal = document.getElementById('confirmModal');
        const confirmDeleteBtn = document.getElementById('confirmDelete');
        const cancelDeleteBtn = document.getElementById('cancelDelete');
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const apiKeyBtn = document.getElementById('apiKeyBtn');
        const fabNewChat = document.getElementById('fabNewChat');
        const overlay = document.getElementById('overlay');

        const apiModal = document.getElementById('apiModal');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const apiConfirm = document.getElementById('apiConfirm');
        const apiCancel = document.getElementById('apiCancel');

        // ---------- IndexedDB 操作 ----------
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: "id" });
                    }
                };
            });
        }

        async function loadSessionsFromDB() {
            const database = await openDB();
            db = database;
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(STORE_NAME, "readonly");
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result || []);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveSessionToDB(session) {
            const database = db || await openDB();
            return new Promise((resolve, reject) => {
                const transaction = database.transaction(STORE_NAME, "readwrite");
                const store = transaction.objectStore(STORE_NAME);
                const request = store.put(session);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function deleteSessionFromDB(sessionId) {
            const database = db || await openDB();
            return new Promise((resolve, reject) => {
                const transaction = database.transaction(STORE_NAME, "readwrite");
                const store = transaction.objectStore(STORE_NAME);
                const request = store.delete(sessionId);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function migrateFromLocalStorage() {
            const stored = localStorage.getItem('deepseek_sessions');
            if (!stored) return false;
            let oldSessions = JSON.parse(stored);
            if (!oldSessions.length) return false;
            const existing = await loadSessionsFromDB();
            if (existing.length > 0) return false;
            for (let session of oldSessions) {
                for (let msg of session.messages) {
                    if (msg.role === 'assistant') {
                        if (!msg.versions) {
                            msg.versions = [{ 
                                content: msg.content, 
                                reasoning_content: msg.reasoning_content || null,
                                timestamp: Date.now() 
                            }];
                            msg.currentVersionIndex = 0;
                        }
                        if (msg.reasoning_content === undefined) msg.reasoning_content = null;
                    }
                }
                await saveSessionToDB(session);
            }
            return true;
        }

        async function refreshSessionsFromDB() {
            sessions = await loadSessionsFromDB();
            if (sessions.length === 0) {
                const newId = Date.now().toString();
                const newSession = {
                    id: newId,
                    name: "新对话",
                    messages: [],
                    createdAt: new Date().toISOString()
                };
                sessions = [newSession];
                await saveSessionToDB(newSession);
            }
            const storedId = localStorage.getItem('currentSessionId');
            if (storedId && sessions.some(s => s.id === storedId)) {
                currentSessionId = storedId;
            } else {
                currentSessionId = sessions[0].id;
            }
            deepThinkEnabled = localStorage.getItem('deepThinkEnabled') === 'true';
            currentTheme = localStorage.getItem('theme') || 'light';
            applyTheme();
            updateDeepThinkButtonUI();
        }

        async function persistCurrentSession() {
            const session = sessions.find(s => s.id === currentSessionId);
            if (session) await saveSessionToDB(session);
        }

        async function addSession(newSession) {
            sessions.unshift(newSession);
            await saveSessionToDB(newSession);
        }

        async function removeSession(sessionId) {
            const index = sessions.findIndex(s => s.id === sessionId);
            if (index !== -1) {
                sessions.splice(index, 1);
                await deleteSessionFromDB(sessionId);
            }
        }

        // ---------- 导出单个会话为 .txt ----------
        async function exportSessionAsTxt(session) {
            let content = `对话名称：${session.name}\n`;
            content += `创建时间：${new Date(session.createdAt).toLocaleString()}\n`;
            content += `导出时间：${new Date().toLocaleString()}\n`;
            content += `==========================================\n\n`;
            for (const msg of session.messages) {
                if (msg.role === 'user') {
                    content += `【我】\n${msg.content}\n\n`;
                } else if (msg.role === 'assistant') {
                    let currentContent = msg.content;
                    let currentReasoning = msg.reasoning_content;
                    if (msg.versions && msg.versions.length > 0) {
                        const version = msg.versions[msg.currentVersionIndex || 0];
                        currentContent = version.content;
                        currentReasoning = version.reasoning_content;
                    }
                    if (currentReasoning && currentReasoning.trim().length > 0) {
                        content += `【DeepSeek 思考过程】\n${currentReasoning}\n\n`;
                    }
                    content += `【DeepSeek】\n${currentContent}\n\n`;
                }
            }
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = `${session.name.replace(/[\\/:*?"<>|]/g, '_')}.txt`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast(`已导出对话“${session.name}”`);
        }

        // ---------- 辅助函数 ----------
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function setApiKeyModal() {
            apiKeyInput.value = DEEPSEEK_API_KEY;
            apiModal.style.display = 'flex';
        }

        function saveApiKey() {
            const newKey = apiKeyInput.value.trim();
            if (newKey && newKey.startsWith('sk-')) {
                DEEPSEEK_API_KEY = newKey;
                localStorage.setItem('deepseek_api_key', DEEPSEEK_API_KEY);
                showToast("API Key 已保存");
                apiModal.style.display = 'none';
            } else if (newKey) {
                alert("无效的 API Key，请确保以 sk- 开头");
            } else {
                apiModal.style.display = 'none';
            }
        }

        function checkApiKey() {
            if (!DEEPSEEK_API_KEY) {
                setApiKeyModal();
                return false;
            }
            return true;
        }

        function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); }
        function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
        function toggleSidebar() {
            if (sidebar.classList.contains('open')) closeSidebar();
            else openSidebar();
        }
        if(overlay) overlay.addEventListener('click', closeSidebar);
        if(menuToggle) menuToggle.addEventListener('click', toggleSidebar);

        function initScrollListener() {
            chatMessagesEl.addEventListener('scroll', () => {
                const { scrollTop, scrollHeight, clientHeight } = chatMessagesEl;
                autoScrollEnabled = (scrollHeight - scrollTop - clientHeight) < 50;
            });
        }
        function scrollToBottom() {
            if (autoScrollEnabled) chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
        }

        function applyTheme() {
            if (currentTheme === 'dark') {
                document.body.classList.add('dark');
                themeToggle.textContent = '☀️';
            } else {
                document.body.classList.remove('dark');
                themeToggle.textContent = '🌙';
            }
        }
        function updateDeepThinkButtonUI() {
            if (deepThinkEnabled) {
                deepThinkToggle.style.backgroundColor = 'var(--user-bubble)';
                deepThinkToggle.style.color = 'white';
            } else {
                deepThinkToggle.style.backgroundColor = '';
                deepThinkToggle.style.color = '';
            }
        }

        async function renameSession(sessionId) {
            const session = sessions.find(s => s.id === sessionId);
            if (!session) return;
            const newName = prompt("请输入新的对话名称:", session.name);
            if (newName && newName.trim()) {
                session.name = newName.trim();
                await persistCurrentSession();
                renderSessionsList();
                if (sessionId === currentSessionId) currentSessionNameSpan.textContent = session.name;
            }
        }

        function renderSessionsList() {
            sessionsListEl.innerHTML = '';
            for (let session of sessions) {
                const div = document.createElement('div');
                div.className = 'session-item';
                if (session.id === currentSessionId) div.classList.add('active');
                const titleSpan = document.createElement('span');
                titleSpan.className = 'session-title';
                titleSpan.textContent = session.name.length > 20 ? session.name.slice(0,20)+'...' : session.name;
                titleSpan.onclick = (e) => {
                    e.stopPropagation();
                    switchSession(session.id);
                };
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'session-actions';
                const exportBtn = document.createElement('button');
                exportBtn.textContent = '📄';
                exportBtn.className = 'export-session';
                exportBtn.title = "导出此对话为TXT";
                exportBtn.onclick = async (e) => {
                    e.stopPropagation();
                    await exportSessionAsTxt(session);
                };
                const editBtn = document.createElement('button');
                editBtn.textContent = '✏️';
                editBtn.className = 'edit-session';
                editBtn.title = "重命名";
                editBtn.onclick = (e) => {
                    e.stopPropagation();
                    renameSession(session.id);
                };
                const delBtn = document.createElement('button');
                delBtn.textContent = '🗑️';
                delBtn.className = 'delete-session';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    pendingDeleteSessionId = session.id;
                    confirmModal.style.display = 'flex';
                };
                actionsDiv.appendChild(exportBtn);
                actionsDiv.appendChild(editBtn);
                actionsDiv.appendChild(delBtn);
                div.appendChild(titleSpan);
                div.appendChild(actionsDiv);
                sessionsListEl.appendChild(div);
            }
        }

        // ---------- 流式请求 ----------
        async function streamDeepSeek(messages, model, onReasoningChunk, onContentChunk, onFinish) {
            if (!checkApiKey()) throw new Error("未设置 API Key");
            const response = await fetch(DEEPSEEK_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                },
                body: JSON.stringify({
                    model: model,
                    messages: messages,
                    stream: true,
                    temperature: 0.7,
                    top_p: 0.9,
                    frequency_penalty: 0.5
                })
            });
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`API 失败: ${response.status} ${errorText}`);
            }
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let finalReasoning = '', finalContent = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        try {
                            const parsed = JSON.parse(data);
                            const delta = parsed.choices[0]?.delta;
                            if (delta) {
                                if (delta.reasoning_content) {
                                    finalReasoning += delta.reasoning_content;
                                    onReasoningChunk(delta.reasoning_content);
                                }
                                if (delta.content) {
                                    finalContent += delta.content;
                                    onContentChunk(delta.content);
                                }
                            }
                        } catch(e) {}
                    }
                }
            }
            onFinish(finalReasoning, finalContent);
            return { reasoning_content: finalReasoning, content: finalContent };
        }

        let streamingMessageWrapper = null, streamingReasoningDiv = null, streamingContentBubble = null;
        function appendToStreamingMessage(reasoningChunk, contentChunk) {
            if (!streamingMessageWrapper) return;
            if (reasoningChunk && streamingReasoningDiv) {
                streamingReasoningDiv.textContent += reasoningChunk;
                const header = streamingReasoningDiv.previousElementSibling;
                if (header && header.classList.contains('reasoning-header') && !streamingReasoningDiv.classList.contains('show')) {
                    streamingReasoningDiv.classList.add('show');
                    header.innerHTML = '🧠 思考过程 ▲';
                }
            }
            if (contentChunk && streamingContentBubble) {
                streamingContentBubble.textContent += contentChunk;
                if (!streamingContentBubble.classList.contains('streaming-cursor')) {
                    streamingContentBubble.classList.add('streaming-cursor');
                }
                scrollToBottom();
            }
        }
        function finishStreamingMessage() {
            if (streamingContentBubble) streamingContentBubble.classList.remove('streaming-cursor');
            streamingMessageWrapper = null;
            streamingReasoningDiv = null;
            streamingContentBubble = null;
        }

        function renderMessages() {
            const session = sessions.find(s => s.id === currentSessionId);
            if (!session) return;
            chatMessagesEl.innerHTML = '';
            streamingMessageWrapper = null;
            for (let i = 0; i < session.messages.length; i++) {
                const msg = session.messages[i];
                const wrapper = document.createElement('div');
                wrapper.className = 'message-wrapper';
                wrapper.dataset.index = i;
                if (msg.role === 'user') {
                    const row = document.createElement('div');
                    row.className = 'message-row user-row';
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble user-message';
                    bubble.textContent = msg.content;
                    row.appendChild(bubble);
                    wrapper.appendChild(row);
                    const actions = document.createElement('div');
                    actions.className = 'message-actions';
                    const editBtn = document.createElement('button');
                    editBtn.innerHTML = '✎ 编辑';
                    editBtn.className = 'action-btn';
                    editBtn.onclick = (e) => {
                        e.stopPropagation();
                        userInput.value = msg.content;
                        userInput.focus();
                        window.editingMessageIndex = i;
                    };
                    actions.appendChild(editBtn);
                    wrapper.appendChild(actions);
                } else if (msg.role === 'assistant') {
                    let currentContent = msg.content, currentReasoning = msg.reasoning_content;
                    if (msg.versions && msg.versions.length > 0) {
                        const ver = msg.versions[msg.currentVersionIndex || 0];
                        currentContent = ver.content;
                        currentReasoning = ver.reasoning_content;
                    }
                    if (currentReasoning && currentReasoning.trim().length > 0) {
                        const reasoningDiv = document.createElement('div');
                        reasoningDiv.className = 'reasoning-container';
                        const header = document.createElement('div');
                        header.className = 'reasoning-header';
                        header.innerHTML = '🧠 思考过程 ▼';
                        header.onclick = () => {
                            const cd = header.nextElementSibling;
                            cd.classList.toggle('show');
                            header.innerHTML = cd.classList.contains('show') ? '🧠 思考过程 ▲' : '🧠 思考过程 ▼';
                        };
                        const contentDiv = document.createElement('div');
                        contentDiv.className = 'reasoning-content';
                        contentDiv.textContent = currentReasoning;
                        reasoningDiv.appendChild(header);
                        reasoningDiv.appendChild(contentDiv);
                        wrapper.appendChild(reasoningDiv);
                    }
                    const row = document.createElement('div');
                    row.className = 'message-row assistant-row';
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble assistant-message';
                    bubble.textContent = currentContent;
                    row.appendChild(bubble);
                    wrapper.appendChild(row);
                    const actions = document.createElement('div');
                    actions.className = 'message-actions assistant-actions';
                    if (msg.versions && msg.versions.length > 1) {
                        const vctrl = document.createElement('div');
                        vctrl.className = 'version-control';
                        const prev = document.createElement('button');
                        prev.textContent = '◀'; prev.className = 'action-btn';
                        prev.onclick = (e) => {
                            e.stopPropagation();
                            let idx = msg.currentVersionIndex || 0;
                            if (idx > 0) { msg.currentVersionIndex = idx-1; persistCurrentSession(); renderMessages(); }
                        };
                        const span = document.createElement('span');
                        span.textContent = `${(msg.currentVersionIndex||0)+1}/${msg.versions.length}`;
                        const next = document.createElement('button');
                        next.textContent = '▶'; next.className = 'action-btn';
                        next.onclick = (e) => {
                            e.stopPropagation();
                            let idx = msg.currentVersionIndex || 0;
                            if (idx < msg.versions.length-1) { msg.currentVersionIndex = idx+1; persistCurrentSession(); renderMessages(); }
                        };
                        vctrl.appendChild(prev); vctrl.appendChild(span); vctrl.appendChild(next);
                        actions.appendChild(vctrl);
                    }
                    const regen = document.createElement('button');
                    regen.innerHTML = '↻ 重新生成';
                    regen.className = 'action-btn';
                    regen.onclick = async (e) => { e.stopPropagation(); await regenerateAssistantMessage(i); };
                    actions.appendChild(regen);
                    wrapper.appendChild(actions);
                }
                chatMessagesEl.appendChild(wrapper);
            }
            scrollToBottom();
            currentSessionNameSpan.textContent = session.name;
        }

        async function sendMessage() {
            if (!checkApiKey()) return;
            const text = userInput.value.trim();
            if (!text) return;
            const session = sessions.find(s => s.id === currentSessionId);
            if (!session) return;

            if (window.editingMessageIndex !== undefined) {
                const editIdx = window.editingMessageIndex;
                const before = session.messages.slice(0, editIdx);
                const newUser = { role: 'user', content: text };
                session.messages = [...before, newUser];
                window.editingMessageIndex = undefined;
                await persistCurrentSession();
                renderMessages();
                const apiMessages = session.messages.map(m => ({ role: m.role, content: m.content }));
                const model = deepThinkEnabled ? "deepseek-reasoner" : "deepseek-chat";
                session.messages.push({ role: 'assistant', content: '', reasoning_content: '', versions: null });
                await persistCurrentSession();
                renderMessages();
                const idx = session.messages.length-1;
                const wrappers = document.querySelectorAll('.message-wrapper');
                const target = wrappers[wrappers.length-1];
                streamingMessageWrapper = target;
                streamingReasoningDiv = target.querySelector('.reasoning-content');
                streamingContentBubble = target.querySelector('.bubble.assistant-message');
                if (streamingContentBubble) streamingContentBubble.textContent = '';
                try {
                    await streamDeepSeek(apiMessages, model,
                        (rc) => appendToStreamingMessage(rc, null),
                        (cc) => appendToStreamingMessage(null, cc),
                        async (finalR, finalC) => {
                            const msgObj = session.messages[idx];
                            msgObj.content = finalC;
                            msgObj.reasoning_content = finalR;
                            msgObj.versions = [{ content: finalC, reasoning_content: finalR, timestamp: Date.now() }];
                            msgObj.currentVersionIndex = 0;
                            await persistCurrentSession();
                            finishStreamingMessage();
                            renderMessages();
                        }
                    );
                } catch(err) {
                    session.messages[idx].content = `错误：${err.message}`;
                    session.messages[idx].reasoning_content = null;
                    session.messages[idx].versions = [{ content: `错误：${err.message}`, reasoning_content: null, timestamp: Date.now() }];
                    session.messages[idx].currentVersionIndex = 0;
                    await persistCurrentSession();
                    finishStreamingMessage();
                    renderMessages();
                }
                userInput.value = '';
                return;
            }

            const userMsg = { role: 'user', content: text };
            session.messages.push(userMsg);
            if (session.messages.length === 1 && session.name === "新对话") {
                session.name = text.length > 20 ? text.slice(0,20)+'...' : text;
            }
            await persistCurrentSession();
            renderMessages();
            userInput.value = '';
            const apiMessages = session.messages.map(m => ({ role: m.role, content: m.content }));
            const model = deepThinkEnabled ? "deepseek-reasoner" : "deepseek-chat";
            session.messages.push({ role: 'assistant', content: '', reasoning_content: '', versions: null });
            await persistCurrentSession();
            renderMessages();
            const msgIdx = session.messages.length-1;
            const wrappers = document.querySelectorAll('.message-wrapper');
            const target = wrappers[wrappers.length-1];
            streamingMessageWrapper = target;
            streamingReasoningDiv = target.querySelector('.reasoning-content');
            streamingContentBubble = target.querySelector('.bubble.assistant-message');
            if (streamingContentBubble) streamingContentBubble.textContent = '';
            try {
                await streamDeepSeek(apiMessages, model,
                    (rc) => appendToStreamingMessage(rc, null),
                    (cc) => appendToStreamingMessage(null, cc),
                    async (finalR, finalC) => {
                        const msgObj = session.messages[msgIdx];
                        msgObj.content = finalC;
                        msgObj.reasoning_content = finalR;
                        msgObj.versions = [{ content: finalC, reasoning_content: finalR, timestamp: Date.now() }];
                        msgObj.currentVersionIndex = 0;
                        await persistCurrentSession();
                        finishStreamingMessage();
                        renderMessages();
                    }
                );
            } catch(err) {
                session.messages[msgIdx].content = `错误：${err.message}`;
                session.messages[msgIdx].reasoning_content = null;
                session.messages[msgIdx].versions = [{ content: `错误：${err.message}`, reasoning_content: null, timestamp: Date.now() }];
                session.messages[msgIdx].currentVersionIndex = 0;
                await persistCurrentSession();
                finishStreamingMessage();
                renderMessages();
            }
        }

        async function regenerateAssistantMessage(index) {
            if (!checkApiKey()) return;
            const session = sessions.find(s => s.id === currentSessionId);
            if (!session) return;
            const msg = session.messages[index];
            if (msg.role !== 'assistant') return;
            const prev = [];
            for (let i=0; i<index; i++) {
                const m = session.messages[i];
                if (m.role === 'user') prev.push({ role: 'user', content: m.content });
                else if (m.role === 'assistant') {
                    let c = m.content;
                    if (m.versions && m.versions.length>0) c = m.versions[m.currentVersionIndex||0].content;
                    prev.push({ role: 'assistant', content: c });
                }
            }
            const lastUser = prev[prev.length-1];
            if (!lastUser || lastUser.role !== 'user') { alert('无法重新生成'); return; }
            const model = deepThinkEnabled ? "deepseek-reasoner" : "deepseek-chat";
            if (!msg.versions) msg.versions = [{ content: msg.content, reasoning_content: msg.reasoning_content||null, timestamp: Date.now() }];
            msg.versions.push({ content: '', reasoning_content: '', timestamp: Date.now() });
            msg.currentVersionIndex = msg.versions.length-1;
            msg.content = ''; msg.reasoning_content = '';
            await persistCurrentSession();
            renderMessages();
            const wrappers = document.querySelectorAll('.message-wrapper');
            const target = Array.from(wrappers).find(w => parseInt(w.dataset.index) === index);
            if (target) {
                streamingMessageWrapper = target;
                streamingReasoningDiv = target.querySelector('.reasoning-content');
                streamingContentBubble = target.querySelector('.bubble.assistant-message');
                if (streamingContentBubble) streamingContentBubble.textContent = '';
                if (streamingReasoningDiv) streamingReasoningDiv.textContent = '';
            }
            try {
                await streamDeepSeek(prev, model,
                    (rc) => appendToStreamingMessage(rc, null),
                    (cc) => appendToStreamingMessage(null, cc),
                    async (finalR, finalC) => {
                        const curVer = msg.versions[msg.currentVersionIndex];
                        curVer.content = finalC;
                        curVer.reasoning_content = finalR;
                        msg.content = finalC;
                        msg.reasoning_content = finalR;
                        await persistCurrentSession();
                        finishStreamingMessage();
                        renderMessages();
                    }
                );
            } catch(err) {
                const curVer = msg.versions[msg.currentVersionIndex];
                curVer.content = `错误：${err.message}`;
                curVer.reasoning_content = null;
                msg.content = `错误：${err.message}`;
                msg.reasoning_content = null;
                await persistCurrentSession();
                finishStreamingMessage();
                renderMessages();
            }
        }

        async function switchSession(sessionId) {
            if (streamingMessageWrapper) return;
            currentSessionId = sessionId;
            localStorage.setItem('currentSessionId', currentSessionId);
            renderSessionsList();
            renderMessages();
            closeSidebar();
        }

        async function createNewSession() {
            if (streamingMessageWrapper) return;
            const newId = Date.now().toString();
            const newSession = {
                id: newId,
                name: "新对话",
                messages: [],
                createdAt: new Date().toISOString()
            };
            await addSession(newSession);
            currentSessionId = newId;
            localStorage.setItem('currentSessionId', currentSessionId);
            renderSessionsList();
            renderMessages();
            closeSidebar();
            showToast("新建对话成功");
        }

        async function deleteSessionConfirmed() {
            if (streamingMessageWrapper) return;
            if (!pendingDeleteSessionId) return;
            await removeSession(pendingDeleteSessionId);
            if (sessions.length === 0) {
                await createNewSession();
            } else if (currentSessionId === pendingDeleteSessionId) {
                currentSessionId = sessions[0].id;
                localStorage.setItem('currentSessionId', currentSessionId);
            }
            renderSessionsList();
            renderMessages();
            pendingDeleteSessionId = null;
            confirmModal.style.display = 'none';
            closeSidebar();
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            applyTheme();
            localStorage.setItem('theme', currentTheme);
        }
        function toggleDeepThink() {
            deepThinkEnabled = !deepThinkEnabled;
            updateDeepThinkButtonUI();
            localStorage.setItem('deepThinkEnabled', deepThinkEnabled);
        }
        function autoResizeTextarea() {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
        }
        function onCurrentSessionNameClick() {
            if (currentSessionId) renameSession(currentSessionId);
        }

        async function init() {
            const migrated = await migrateFromLocalStorage();
            if (migrated) showToast("已从旧版迁移数据到新存储，所有对话保留");
            await refreshSessionsFromDB();
            renderSessionsList();
            renderMessages();
            initScrollListener();

            if (!DEEPSEEK_API_KEY) {
                setTimeout(() => setApiKeyModal(), 500);
            }

            sendBtn.addEventListener('click', sendMessage);
            newChatBtn.addEventListener('click', createNewSession);
            themeToggle.addEventListener('click', toggleTheme);
            deepThinkToggle.addEventListener('click', toggleDeepThink);
            confirmDeleteBtn.addEventListener('click', deleteSessionConfirmed);
            cancelDeleteBtn.addEventListener('click', () => {
                confirmModal.style.display = 'none';
                pendingDeleteSessionId = null;
            });
            userInput.addEventListener('input', autoResizeTextarea);
            userInput.addEventListener('keydown', (e) => { /* 回车换行，不发送 */ });
            document.querySelector('.main').addEventListener('click', (e) => {
                if (sidebar.classList.contains('open') && !sidebar.contains(e.target)) closeSidebar();
            });
            currentSessionNameSpan.addEventListener('click', onCurrentSessionNameClick);
            apiKeyBtn.addEventListener('click', setApiKeyModal);
            fabNewChat.addEventListener('click', createNewSession);
            apiConfirm.addEventListener('click', saveApiKey);
            apiCancel.addEventListener('click', () => apiModal.style.display = 'none');
            apiModal.addEventListener('click', (e) => { if (e.target === apiModal) apiModal.style.display = 'none'; });
            confirmModal.addEventListener('click', (e) => { if (e.target === confirmModal) confirmModal.style.display = 'none'; });
        }

        init();
    })();
</script>
